name: Parse repository name

description: Parse repository full name

inputs:
    repository:
        # `default: ${{ github.repository }}` is not working here https://github.com/actions/toolkit/issues/1124
        description: Repository full name e.g. `core-ds/core-components`. Default to `github.repository`
        required: false

outputs:
    owner:
        description: Repository owner e.g. `core-ds/core-components` -> `core-ds`
        value: ${{ steps.parse.outputs.owner }}
    repo:
        description: Repository name e.g. `core-ds/core-components` -> `core-components`
        value: ${{ steps.parse.outputs.repo }}
    full-name:
        description: Repository full name. Same as inputs.repository
        value: ${{ steps.parse.outputs.result }}

runs:
    using: composite
    steps:
        - name: Parse
          id: parse
          uses: actions/github-script@v8
          with:
              result-encoding: string
              script: |
                  const repository = '${{ inputs.repository }}' || '${{ github.repository }}';
                  const [owner, repo] = repository.split('/');

                  core.setOutput('owner', owner);
                  core.setOutput('repo', repo);

                  return repository;
