name: main

on:
    pull_request:
    push:
        branches:
            - version/49

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

defaults:
    run:
        shell: bash

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: ./.github/actions/ci-setup

            - name: run build
              run: yarn build
              env:
                  BUILD_CONCURRENCY: 4

    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: ./.github/actions/ci-setup

            - name: check package.json
              run: |
                  yarn check-package-json

            - name: check tsconfig
              run: |
                  yarn tsconfig check

            - name: run format
              run: |
                  yarn format

            - name: run lint
              run: |
                  yarn lint

    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: ./.github/actions/ci-setup

            - name: setup timezone
              uses: zcong1993/setup-timezone@master
              with:
                  timezone: Europe/Moscow

            - name: build themes
              run: |
                  yarn build --scope @alfalab/core-components-themes

            - name: run test
              run: |
                  yarn test --coverage

            - uses: actions/upload-artifact@v7
              with:
                  name: coverage
                  path: '${{ github.workspace }}/coverage'

    codemod-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: ./.github/actions/ci-setup

            - name: run codemod test
              run: |
                  yarn test:codemod

    upload-coverage:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/download-artifact@v8
              with:
                  name: coverage
                  path: '${{ github.workspace }}/coverage'

            - uses: coverallsapp/github-action@v2
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}

    demo:
        uses: core-ds/core-components/.github/workflows/demo.yml@master
        secrets: inherit
        with:
            directory: ${{ case(github.event_name == 'pull_request', github.event.pull_request.number, github.ref_name) }}

    screenshot-test:
        needs: demo
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  lfs: true

            - uses: ./.github/actions/ci-setup

            - name: download build
              uses: actions/download-artifact@v8
              with:
                  name: build
                  path: build
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  run-id: ${{ needs.demo.outputs.run-id }}

              # https://github.com/americanexpress/jest-image-snapshot/issues/281
            - name: run screenshot test
              uses: actions/github-script@v8
              with:
                  script: |
                      const { stderr } = await exec.getExecOutput('yarn', ['test:screenshots']);

                      if (/[0-9]+ snapshots? written from [0-9]+ test suites?/.test(stderr)) {
                          core.setFailed(`Please add missing ${{ matrix.variant }} screenshots`);
                      }

            - uses: actions/upload-artifact@v7
              if: failure()
              with:
                  name: 'diff-${{ matrix.variant }}'
                  path: packages/**/__diff_output__/*
                  if-no-files-found: ignore

    ci-ok:
        name: ci ok
        runs-on: ubuntu-latest
        if: always()
        needs: [lint, build, demo, test, screenshot-test, codemod-test]
        env:
            FAILURE: ${{ contains(join(needs.*.result, ','), 'failure') }}
        steps:
            - name: check for failure
              run: |
                  echo $FAILURE
                  if [ "$FAILURE" = "false" ]; then
                    exit 0
                  else
                    exit 1
                  fi
