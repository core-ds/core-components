name: main

on:
    pull_request:
        branches-ignore:
            - next
    push:
        branches:
            - master
            - next

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

defaults:
    run:
        shell: bash

jobs:
    variants:
        runs-on: ubuntu-latest
        steps:
            - id: repository
              uses: core-ds/core-components/.github/actions/parse-repository@master
              with:
                  repository: ${{ github.event.pull_request.head.repo.full_name }}

            - name: generate app token
              id: generate-token
              uses: actions/create-github-app-token@v2
              with:
                  app-id: 3018134
                  private-key: ${{ secrets.APP_PRIVATE_KEY }}
                  owner: ${{ steps.repository.outputs.owner }}
                  repositories: ${{ steps.repository.outputs.repo }}
