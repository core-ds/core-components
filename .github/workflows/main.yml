name: main

on:
    pull_request:
        branches-ignore:
            - next
    push:
        branches:
            - master
            - next
            - 'version/**'

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

defaults:
    run:
        shell: bash

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup CI
              uses: core-ds/core-components/.github/actions/ci-setup@ci/pretty-fixes

            - name: Run build
              run: yarn build
              env:
                  BUILD_CONCURRENCY: 4

    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup CI
              uses: core-ds/core-components/.github/actions/ci-setup@ci/pretty-fixes

            - name: Check package.json
              run: |
                  yarn check-package-json

            - name: Check tsconfig
              run: |
                  yarn tsconfig check

            - name: Run format
              run: |
                  yarn format

            - name: Run lint
              run: |
                  yarn lint

    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup CI
              uses: core-ds/core-components/.github/actions/ci-setup@ci/pretty-fixes

            - name: Setup timezone
              uses: zcong1993/setup-timezone@master
              with:
                  timezone: Europe/Moscow

            - name: Build themes
              run: |
                  yarn build --scope @alfalab/core-components-themes

            - name: Run test
              run: |
                  yarn test --coverage

            - name: Upload coverage
              uses: actions/upload-artifact@v7
              with:
                  name: coverage
                  path: '${{ github.workspace }}/coverage'

    codemod-test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup CI
              uses: core-ds/core-components/.github/actions/ci-setup@ci/pretty-fixes

            - name: Run codemod test
              run: |
                  yarn test:codemod

    upload-coverage:
        needs: test
        runs-on: ubuntu-latest
        if: ${{ github.repository == 'core-ds/core-components' }}
        steps:
            - name: Download coverage
              uses: actions/download-artifact@v8
              with:
                  name: coverage
                  path: '${{ github.workspace }}/coverage'

            - name: Upload coverage to coveralls
              uses: coverallsapp/github-action@v2
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}

    demo:
        uses: core-ds/core-components/.github/workflows/demo.yml@ci/pretty-fixes
        secrets: inherit
        with:
            version: ${{ case(github.event_name == 'pull_request', github.event.pull_request.head.sha, github.ref) }}
            directory: ${{ github.event.pull_request.number }}

    screenshot-test:
        needs: demo
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  lfs: true

            - name: Setup CI
              uses: core-ds/core-components/.github/actions/ci-setup@ci/pretty-fixes

            - name: Download build
              uses: actions/download-artifact@v8
              with:
                  name: build
                  path: build
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  run-id: ${{ needs.demo.outputs.run-id }}

              # https://github.com/americanexpress/jest-image-snapshot/issues/281
            - name: Run screenshot test
              uses: actions/github-script@v8
              with:
                  script: |
                      const { stderr } = await exec.getExecOutput('yarn', ['test:screenshots']);

                      if (/[0-9]+ snapshots? written from [0-9]+ test suites?/.test(stderr)) {
                          core.setFailed(`Please add missing ${{ matrix.variant }} screenshots`);
                      }

            - name: Upload diff
              uses: actions/upload-artifact@v7
              if: failure()
              with:
                  name: 'diff-${{ matrix.variant }}'
                  path: packages/**/__diff_output__/*
                  if-no-files-found: ignore

    search-vars:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup CI
              uses: core-ds/core-components/.github/actions/ci-setup@ci/pretty-fixes

            - name: Run build
              shell: bash
              env:
                  BUILD_WITHOUT_CSS_VARS: 'true'
                  BUILD_CONCURRENCY: 4
                  BUILD_MODERN_ONLY: 'true'
              run: |
                  yarn build

            - name: Search
              run: yarn non-existent-css-vars

    ok:
        runs-on: ubuntu-latest
        if: always()
        needs: [lint, build, demo, test, screenshot-test, codemod-test, search-vars]
        env:
            FAILURE: ${{ contains(join(needs.*.result, ','), 'failure') }}
        steps:
            - name: Check for failure
              run: |
                  echo $FAILURE
                  if [ "$FAILURE" = "false" ]; then
                    exit 0
                  else
                    exit 1
                  fi
