name: release

on:
    workflow_dispatch: # version/48 and pull request
        inputs:
            pull-request:
                description: Pull request number
                type: number
                required: true
    push:
        branches:
            - master
            - next
            - 'version/**'
            - '!version/48'

concurrency:
    group: ${{ format('{0} ${1}', github.workflow, case(github.event_name == 'push', github.ref, format('pull_request {0}', inputs.pull-request))) }}
    cancel-in-progress: true

jobs:
    release:
        if: ${{ github.event_name == 'push' && github.repository == 'core-ds/core-components' }}
        runs-on: ubuntu-latest
        outputs:
            published: ${{ steps.changesets.outputs.published }}
        steps:
            - name: Generate app token
              id: generate-token
              uses: actions/create-github-app-token@v3
              with:
                  app-id: ${{ vars.APP_ID }}
                  private-key: ${{ secrets.APP_PRIVATE_KEY }}

            - name: Checkout
              uses: actions/checkout@v6
              with:
                  token: ${{ steps.generate-token.outputs.token }}

            - name: Setup CI
              uses: core-ds/core-components/.github/actions/ci-setup@master

            - name: Create release pull request or publish to npm
              uses: changesets/action@v1
              id: changesets
              with:
                  publish: yarn release
                  version: yarn version-packages
                  commit: 'chore: version packages'
              env:
                  # `secrets.GITHUB_TOKEN` doesn't trigger any action https://github.com/orgs/community/discussions/55906
                  GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    snapshot-release:
        if: ${{ github.event_name == 'workflow_dispatch' && github.repository == 'core-ds/core-components' }}
        permissions:
            id-token: write # to use OpenID Connect token for trusted publishing
        runs-on: ubuntu-latest
        outputs:
            published: ${{ steps.publish.outputs.published }}
            published-packages: ${{ steps.publish.outputs.published-packages }}
        steps:
            - name: Get pull request data
              id: data
              uses: actions/github-script@v8
              with:
                  script: |
                      const { data } = await octokit.rest.pulls.get({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          pull_number: ${{ inputs.pull-request }},
                      });

                      if (data.head.repo.fork) {
                          core.setOutput('repository', data.head.repo.full_name);
                      }

                      core.setOutput('sha', data.head.sha);

            - name: Checkout
              uses: actions/checkout@v6
              with:
                  repository: ${{ steps.data.outputs.repository }}
                  ref: ${{ steps.data.outputs.sha }}

            - name: Setup CI
              uses: core-ds/core-components/.github/actions/ci-setup@master

            - name: Publish to npm
              id: publish
              uses: core-ds/changesets-snapshot-release@v1
              with:
                  version: 'yarn version-packages:snapshot'
                  publish: 'yarn release:snapshot'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    comment:
        needs: snapshot-release
        if: ${{ fromJson(needs.snapshot-release.outputs.published) }}
        runs-on: ubuntu-latest
        permissions:
            issues: write # to post issue comments
            pull-requests: write # to post pull-requests comments
        steps:
            - name: Prepare comment
              id: prepare-comment
              uses: actions/github-script@v8
              env:
                  PUBLISHED_PACKAGES: ${{ needs.snapshot-release.outputs.published-packages }}
              with:
                  result-encoding: string
                  script: |
                      return JSON.parse(process.env.PUBLISHED_PACKAGES)
                          .map(({ name, version }, index) => `${index + 1}. \`${name}@${version}\``)
                          .join('\n\n');

            - name: Create comment
              uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  issue-number: ${{ inputs.pull-request }}
                  body: |
                      ## Snapshot release

                      Successfully released the following packages:

                      ${{ steps.prepare-comment.outputs.result }}
                  reactions: rocket
