name: package-sizes

on: pull_request

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

defaults:
    run:
        shell: bash

env:
    PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

jobs:
    base:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.base_ref }}

            - name: Setup CI
              uses: ./.github/actions/ci-setup

            - name: Analyze
              run: |
                  yarn analyze-package-sizes

            - name: Upload base result
              uses: actions/upload-artifact@v7
              with:
                  name: base
                  path: package-sizes.json
                  if-no-files-found: error

    head:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup CI
              uses: ./.github/actions/ci-setup

            - name: Analyze
              run: |
                  yarn analyze-package-sizes

            - name: Upload head result
              uses: actions/upload-artifact@v7
              with:
                  name: head
                  path: package-sizes.json
                  if-no-files-found: error

    compare:
        runs-on: ubuntu-latest
        needs: [base, head]
        outputs:
            result: ${{ steps.compare.outputs.result }}
        steps:
            - name: Download base result
              uses: actions/download-artifact@v8
              with:
                  name: base
                  path: base

            - name: Download head result
              uses: actions/download-artifact@v8
              with:
                  name: head
                  path: head

            - name: Compare package sizes
              id: compare
              uses: actions/github-script@v8
              with:
                  result-encoding: string
                  script: |
                      const fs = require('node:fs/promises');

                      async function readJson(p) {
                          const content = await fs.readFile(p, { encoding: 'utf8' });

                          return JSON.parse(content);
                      }

                      const baseFile = await readJson('${{ github.workspace }}/base/package-sizes.json');
                      const headFile = await readJson('${{ github.workspace }}/head/package-sizes.json');

                      let shouldComment = false;

                      const targetComponents = Object.keys(baseFile);
                      const currentComponents = Object.keys(headFile);

                      const table = [...new Set([...targetComponents, ...currentComponents])]
                          .sort((a, b) => a.localeCompare(b))
                          .reduce((acc, packageName) => {
                              const entryPoints = [
                                  ...new Set([
                                      ...Object.keys(baseFile[packageName] ?? {}),
                                      ...Object.keys(headFile[packageName] ?? {}),
                                  ]),
                              ];

                              let result = acc;

                              entryPoints.forEach((entryPoint) => {
                                  const now = headFile[packageName]?.[entryPoint] ?? 0;
                                  const before = baseFile[packageName]?.[entryPoint] ?? 0;
                                  const diff = now - before;

                                  if (Math.abs(diff) >= 1) {
                                      shouldComment = true;
                                      result += `| ${packageName}/${entryPoint} | ${now} ${
                                          diff > 0
                                              ? `(+${diff.toFixed(2)} KB ❌)`
                                              : `(-${(diff * -1).toFixed(2)} KB ✅)`
                                      } |\n`;
                                  }
                              });

                              return result;
                          }, '## Bundle size report\n| Entry point | Size (minified) |\n| --- | --- |\n');

                      return shouldComment ? table : '';

    comment:
        runs-on: ubuntu-latest
        needs: compare
        steps:
            - name: Find comment
              uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4
              id: find-comment
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  issue-number: ${{ github.event.pull_request.number }}
                  comment-author: 'github-actions[bot]'
                  body-includes: Bundle size report

            - name: Create or update comment
              if: ${{ needs.compare.outputs.result != '' }}
              uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  comment-id: ${{ steps.find-comment.outputs.comment-id }}
                  issue-number: ${{ github.event.pull_request.number }}
                  body: ${{ needs.compare.outputs.result }}
                  edit-mode: replace

            - name: Delete outdated comment
              if: ${{ needs.compare.outputs.result == '' && steps.find-comment.outputs.comment-id != '' }}
              uses: actions/github-script@v8
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      await github.rest.issues.deleteComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: '${{ steps.find-comment.outputs.comment-id }}',
                      });
