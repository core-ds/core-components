name: deploy-demo

on:
    workflow_call:
        inputs:
            run-id:
                description: Artifact workflow run id
                required: true
                type: string
            directory:
                description: Deploy directory
                required: true
                type: string
            variant:
                description: Variant of core components
                required: false
                type: string
                default: default
            artifact-name:
                description: Artifact name
                required: false
                type: string
                default: build

defaults:
    run:
        shell: bash

jobs:
    deploy:
        name: deploy
        runs-on: ubuntu-latest
        outputs:
            url: ${{ steps.url.outputs.result }}
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: gh-pages
                  lfs: true
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: clean up
              run: |
                  rm -rf '${{ inputs.directory }}'

            - name: download build
              uses: actions/download-artifact@v8
              with:
                  name: ${{ inputs.artifact-name }}
                  path: ${{ inputs.directory }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  run-id: ${{ inputs.run-id }}

            - name: copy legacy archive-versions.json
              if: ${{ startsWith(inputs.directory, 'master') }}
              run: |
                  cp archive-versions.json '${{ inputs.directory }}'

            - name: deploy
              uses: core-ds/core-components/.github/actions/commit-and-push@master
              with:
                  message: 'Deploy to GitHub Pages'

            - name: demo url
              id: url
              uses: actions/github-script@v8
              with:
                  result-encoding: string
                  script: |
                      const { owner, repo } = context.repo;

                      return `https://${owner}.github.io/${repo}/${{ inputs.directory }}`;

    pull-request:
        name: find pull request
        runs-on: ubuntu-latest
        outputs:
            number: ${{ steps.pull-request.outputs.number }}
        steps:
            - name: find pull request
              uses: jwalton/gh-find-current-pr@v1
              id: pull-request
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}

    comment:
        name: comment
        runs-on: ubuntu-latest
        needs: [deploy, pull-request]
        if: ${{ needs.pull-request.outputs.number != '' }}
        steps:
            - name: find comment
              uses: peter-evans/find-comment@v4
              id: comment
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  issue-number: ${{ needs.pull-request.outputs.number }}
                  comment-author: 'github-actions[bot]'
                  body-includes: Demo build (${{ inputs.variant }})

            - name: create or update comment
              uses: peter-evans/create-or-update-comment@v5
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  comment-id: ${{ steps.comment.outputs.comment-id }}
                  issue-number: ${{ needs.pull-request.outputs.number }}
                  body: |
                      ## Demo build (${{ inputs.variant }})

                      [${{ needs.deploy.outputs.url }}](${{ needs.deploy.outputs.url }})
                  reactions: rocket
                  edit-mode: replace
