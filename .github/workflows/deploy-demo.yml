name: deploy-demo

on:
    workflow_call:
        inputs:
            run-id:
                description: Artifact workflow run id
                required: true
                type: string
            directory:
                description: Deploy directory
                required: true
                type: string
            variant:
                description: Variant of core components
                required: false
                type: string
                default: default
            artifact-name:
                description: Artifact name
                required: false
                type: string
                default: build
            deploy-repository:
                description: Repository
                required: false
                type: string
                default: ${{ github.repository }}
            sha:
                description: The SHA of the commit
                type: string
                required: false

defaults:
    run:
        shell: bash

jobs:
    deploy:
        name: deploy
        runs-on: ubuntu-latest
        outputs:
            url: 'https://${{ steps.repository.outputs.owner }}.github.io/${{ steps.repository.outputs.repo }}/${{ inputs.directory }}'
        steps:
            - id: repository
              uses: core-ds/core-components/.github/actions/parse-repository@master
              with:
                  repository: ${{ inputs.deploy-repository }}

            - name: generate app token
              id: generate-token
              uses: actions/create-github-app-token@v2
              with:
                  app-id: ${{ vars.APP_ID }}
                  private-key: ${{ secrets.APP_PRIVATE_KEY }}
                  owner: ${{ steps.repository.outputs.owner }}
                  repositories: ${{ steps.repository.outputs.repo }}

            - uses: actions/checkout@v6
              with:
                  repository: ${{ steps.repository.outputs.full-name }}
                  token: ${{ steps.generate-token.outputs.token }}
                  ref: gh-pages
                  lfs: true

            - name: clean up
              run: |
                  rm -rf '${{ inputs.directory }}'

            - name: download build
              uses: actions/download-artifact@v8
              with:
                  name: '${{ inputs.artifact-name }}'
                  path: '${{ inputs.directory }}'
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  run-id: ${{ inputs.run-id }}

            - name: copy legacy archive-versions.json
              if: ${{ startsWith(inputs.directory, 'master') }}
              run: |
                  cp archive-versions.json '${{ inputs.directory }}'

            - name: deploy
              uses: core-ds/core-components/.github/actions/commit-and-push@master
              with:
                  message: 'Deploy to GitHub Pages'

    pull-requests:
        name: find pull request
        runs-on: ubuntu-latest
        outputs:
            json: ${{ steps.pull-requests.outputs.json }}
            empty: ${{ steps.pull-requests.outputs.empty }}
        steps:
            - name: find pull request
              uses: core-ds/core-components/.github/actions/find-open-pull-requests@master
              id: pull-requests
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  sha: ${{ inputs.sha }}

    comment:
        runs-on: ubuntu-latest
        needs: [deploy, pull-requests]
        if: ${{ needs.pull-requests.outputs.empty == 'false' }}
        strategy:
            fail-fast: false
            matrix:
                pull-request-number: ${{ fromJson(needs.pull-requests.outputs.json) }}
        steps:
            - name: find comment
              uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4
              id: comment
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  issue-number: ${{ matrix.pull-request-number }}
                  comment-author: 'github-actions[bot]'
                  body-includes: Demo build (${{ inputs.variant }})

            - name: create or update comment
              uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  comment-id: ${{ steps.comment.outputs.comment-id }}
                  issue-number: ${{ matrix.pull-request-number }}
                  body: |
                      ## Demo build (${{ inputs.variant }})

                      ${{ format('[{0}]({0})', needs.deploy.outputs.url ) }}
                  reactions: rocket
                  edit-mode: replace
