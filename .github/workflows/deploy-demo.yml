name: deploy-demo

on:
    workflow_call:
        inputs:
            run-id:
                description: Artifact workflow run id
                required: true
                type: string
            directory:
                description: Directory to deploy demo
                required: true
                type: string
            variant:
                description: Variant of core components
                required: false
                type: string
                default: default
            artifact-name:
                description: Artifact name
                required: false
                type: string
                default: build
            deploy-repository:
                description: Repository
                required: false
                type: string
            pull-request-number:
                description: Pull request number
                type: number
                required: false

defaults:
    run:
        shell: bash

jobs:
    deploy:
        runs-on: ubuntu-latest
        continue-on-error: true
        # check if vars are available
        if: ${{ vars.APP_ID != '' }}
        outputs:
            url: 'https://${{ steps.repository.outputs.owner }}.github.io/${{ steps.repository.outputs.repo }}/${{ inputs.directory }}'
        steps:
            - name: Parse repository name
              id: repository
              uses: core-ds/core-components/.github/actions/parse-repository@master
              with:
                  repository: ${{ inputs.deploy-repository }}

            - name: Generate app token
              id: generate-token
              if: ${{ github.repository == 'core-ds/core-components' }}
              uses: actions/create-github-app-token@v3
              with:
                  app-id: ${{ vars.APP_ID }}
                  private-key: ${{ secrets.APP_PRIVATE_KEY }}
                  owner: ${{ steps.repository.outputs.owner }}
                  repositories: ${{ steps.repository.outputs.repo }}

            - name: Checkout
              uses: actions/checkout@v6
              with:
                  repository: ${{ steps.repository.outputs.full-name }}
                  token: ${{ case(github.repository == 'core-ds/core-components', steps.generate-token.outputs.token, secrets.GITHUB_TOKEN) }}
                  ref: gh-pages
                  lfs: true

            - name: Clean up
              run: |
                  rm -rf '${{ inputs.directory }}'

            - name: Download demo
              uses: actions/download-artifact@v8
              with:
                  name: ${{ inputs.artifact-name }}
                  path: ${{ inputs.directory }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  run-id: ${{ inputs.run-id }}

            - name: Copy legacy archive-versions.json
              if: ${{ startsWith(inputs.directory, 'master') }}
              run: |
                  cp archive-versions.json '${{ inputs.directory }}'

            - name: Commit and push
              uses: core-ds/core-components/.github/actions/commit-and-push@master
              with:
                  message: 'Deploy to GitHub Pages'

    comment:
        runs-on: ubuntu-latest
        needs: deploy
        if: ${{ inputs.pull-request-number != '' }}
        continue-on-error: true
        permissions:
            issues: write # to post issue comments
            pull-requests: write # to post pull-requests comments
        steps:
            - name: Find comment
              uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4
              id: comment
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  issue-number: ${{ inputs.pull-request-number }}
                  comment-author: 'github-actions[bot]'
                  body-includes: Demo build (${{ inputs.variant }})

            - name: Create or update comment
              uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  comment-id: ${{ steps.comment.outputs.comment-id }}
                  issue-number: ${{ inputs.pull-request-number }}
                  body: |
                      ## Demo build (${{ inputs.variant }})

                      ${{ format('[{0}]({0})', needs.deploy.outputs.url ) }}
                  reactions: rocket
                  edit-mode: replace
