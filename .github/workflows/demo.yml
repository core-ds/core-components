name: demo

on:
    workflow_call:
        inputs:
            version:
                description: Version of @alfalab/core-components package, tag, ref or sha
                required: true
                type: string
            directory:
                description: Directory to deploy demo
                required: false
                type: string
            deploy-repository:
                description: Repository
                required: false
                type: string
            pull-request-number:
                description: Pull request number
                type: number
                required: false
        outputs:
            run-id:
                description: Artifact workflow run id
                value: ${{ jobs.build-demo.outputs.run-id }}
    workflow_dispatch:
        inputs:
            version:
                description: Version of @alfalab/core-components package, tag or sha
                required: false
                type: string
            directory:
                description: Directory to deploy demo
                required: false
                type: string

concurrency:
    group: ${{ format('Demo {0}', case(inputs.version == '', github.ref, inputs.version)) }}
    cancel-in-progress: true

defaults:
    run:
        shell: bash

jobs:
    params:
        uses: core-ds/core-components/.github/workflows/resolve-demo-params.yml@master
        secrets: inherit
        with:
            version: ${{ case(github.event_name == 'workflow_dispatch' && inputs.version == '', github.ref, inputs.version) }}
            directory: ${{ inputs.directory }}

    variants:
        needs: params
        uses: core-ds/core-components/.github/workflows/variants.yml@master
        with:
            ref: ${{ needs.params.outputs.ref }}

    build-demo:
        needs: [params, variants]
        strategy:
            matrix:
                include: ${{ fromJson(needs.variants.outputs.config) }}
        uses: core-ds/core-components/.github/workflows/build-demo.yml@master
        secrets: inherit
        with:
            ref: ${{ needs.params.outputs.ref }}
            variant: ${{ matrix.variant }}
            artifact-name: ${{ matrix.variant }}

    deploy:
        needs: [build-demo, params, variants]
        strategy:
            max-parallel: 1
            matrix:
                include: ${{ fromJson(needs.variants.outputs.config) }}
        uses: core-ds/core-components/.github/workflows/deploy-demo.yml@master
        secrets: inherit
        with:
            run-id: ${{ needs.build-demo.outputs.run-id }}
            directory: ${{ case(matrix.variant == 'default', needs.params.outputs.directory, format('{0}-{1}', needs.params.outputs.directory, matrix.variant)) }}
            variant: ${{ matrix.variant }}
            artifact-name: ${{ matrix.variant }}
            deploy-repository: ${{ inputs.deploy-repository }}
            pull-request-number: ${{ inputs.pull-request-number }}
