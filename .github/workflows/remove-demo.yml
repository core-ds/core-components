name: remove-demo

on:
    pull_request:
        types: [closed]
    workflow_dispatch:
        inputs:
            directory:
                description: Demo directory or list of directories separated by comma
                required: true
                type: string
            include-variant:
                description: Include variant into demo directory name
                required: false
                type: boolean
                default: false

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: false

defaults:
    run:
        shell: bash

jobs:
    variant:
        if: ${{ inputs.include-variant == 'true' || github.event_name == 'pull_request' }}
        uses: core-ds/core-components/.github/workflows/variant.yml@master
        secrets: inherit

    resolve-directory:
        needs: variant
        if: ${{ always() && (needs.variant.result == 'success' || needs.variant.result == 'skipped') }}
        runs-on: ubuntu-latest
        outputs:
            result: ${{ steps.resolve.outputs.result }}
        steps:
            - id: resolve
              uses: actions/github-script@v8
              with:
                  script: |
                      const directories = '${{ case(github.event_name == 'pull_request', github.event.pull_request.number, inputs.directory) }}'.split(',').map(directory => ({ directory }));

                      if ('${{ needs.variant.result }}' === 'skipped') {
                          return directories;
                      }

                      const variants = JSON.parse('${{ needs.variant.outputs.result }}');

                      return directories.flatMap(({ directory }) => [{ directory }, ...variants.map(({ variant }) => ({ directory: `${directory}-${variant}` }))]);

    remove-demo:
        name: remove demo
        needs: [resolve-directory]
        runs-on: ubuntu-latest
        if: ${{ github.repository == 'core-ds/core-components' && always() && needs.resolve-directory.result == 'success' }}
        steps:
            - uses: actions/checkout@v5
              with:
                  ref: gh-pages
                  lfs: true
                  token: ${{ secrets.GITHUB_TOKEN }}

            - id: remove
              uses: actions/github-script@v8
              with:
                  result-encoding: string
                  script: |
                      const directories = JSON.parse('${{ needs.resolve-directory.outputs.result }}');

                      await Promise.all(directories.map(({ directory }) => exec.exec('rm', ['-rf', directory])));

                      const { stdout } = await exec.getExecOutput('git', ['status', '--porcelain']);

                      return stdout.split('\n').some((line) => /^\s+D\s+.*$/.test(line));

            - name: deploy
              if: ${{ steps.remove.outputs.result == 'true' }}
              uses: core-ds/core-components/.github/actions/commit-and-push@master
              with:
                  message: 'Deploy to GitHub Pages'
