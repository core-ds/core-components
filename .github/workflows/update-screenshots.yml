name: update-screenshots

on: workflow_dispatch

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build-demo:
        uses: core-ds/core-components/.github/workflows/build-demo.yml@ci/pretty-fixes
        secrets: inherit

    update:
        runs-on: ubuntu-latest
        needs: build-demo
        if: ${{ github.repository == 'core-ds/core-components' }}
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  lfs: true

            - name: Setup CI
              uses: core-ds/core-components/.github/actions/ci-setup@ci/pretty-fixes

            - name: download build
              uses: actions/download-artifact@v8
              with:
                  name: build
                  path: build
                  run-id: ${{ needs.build-demo.outputs.run-id }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Update screenshots
              shell: bash
              run: |
                  yarn test:screenshots -u

            - name: Git status
              id: git-status
              uses: actions/github-script@v8
              with:
                  script: |
                      const { stdout } = await exec.getExecOutput('git', ['status', '--porcelain']);

                      return stdout.split('\n').some(line => /^\s+M\s+.*\.png$/.test(line));

            - name: Update branch
              if: ${{ steps.git-status.outputs.result == 'true' }}
              uses: core-ds/core-components/.github/actions/commit-and-push@ci/pretty-fixes
              with:
                  message: 'test: updated screenshots'
