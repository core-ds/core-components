name: package size

on: pull_request

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    check:
        name: check bundle size
        runs-on: ubuntu-latest
        outputs:
            result: ${{ steps.compare.outputs.result }}
        steps:
            - uses: actions/checkout@v4

            - uses: ./.github/actions/ci-setup

            - name: calculate current sizes
              run: yarn analyze-package-sizes

            - name: compare sizes
              id: compare
              uses: actions/github-script@v7
              with:
                  result-encoding: string
                  script: |
                      const fs = require('node:fs/promises');
                      const shell = require('shelljs');

                      const targetFile = JSON.parse(
                          shell.exec(
                              `wget -qO- https://raw.githubusercontent.com/${process.env.GITHUB_REPOSITORY}/${process.env.GITHUB_BASE_REF}/.storybook/package-sizes.json`,
                              { silent: true },
                          ).stdout,
                      );
                      const currentFile = JSON.parse(
                          await fs.readFile('./.storybook/package-sizes.json', { encoding: 'utf8' }),
                      );

                      let shouldComment = false;

                      const targetComponents = Object.keys(targetFile);
                      const currentComponents = Object.keys(currentFile);

                      const table = [...new Set([...targetComponents, ...currentComponents])]
                         .sort((a, b) => a.localeCompare(b))
                         .reduce((acc, packageName) => {
                              const entryPoints = [
                                  ...new Set([
                                      ...Object.keys(targetFile[packageName] || {}),
                                      ...Object.keys(currentFile[packageName] || {}),
                                  ]),
                              ];

                              entryPoints.forEach((entryPoint) => {
                                  const now = currentFile[packageName]?.[entryPoint] || 0;
                                  const before = targetFile[packageName]?.[entryPoint] || 0;

                                  if (Math.abs(now - before) >= 1) {
                                      shouldComment = true;
                                      acc += `| ${packageName}/${entryPoint} | ${now} ${
                                          now - before > 0
                                              ? `(+${(now - before).toFixed(2)} KB ❌)`
                                              : `(-${(before - now).toFixed(2)} KB ✅)`
                                      } |\n`;
                                  }
                              });

                              return acc;
                          },
                          '## Bundle size report\n| Entry point | Size (minified) |\n| --- | --- |\n',
                      );

                      if (shouldComment) {
                          return table;
                      }

    comment:
        name: comment
        runs-on: ubuntu-latest
        needs: check
        steps:
            - name: find comment
              if: ${{ needs.check.outputs.result != '' }}
              uses: peter-evans/find-comment@v3
              id: find-comment
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  issue-number: ${{ github.event.pull_request.number }}
                  comment-author: github-actions[bot]
                  body-includes: Bundle size report

            - name: create or update comment
              if: ${{ needs.check.outputs.result != '' }}
              uses: peter-evans/create-or-update-comment@v3
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  comment-id: ${{ steps.find-comment.outputs.comment-id }}
                  issue-number: ${{ github.event.pull_request.number }}
                  body: ${{ needs.check.outputs.result }}
                  edit-mode: replace

            - name: delete outdated comment
              if: ${{ needs.check.outputs.result == '' && steps.find-comment.outputs.comment-id != '' }}
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const owner = process.env.GITHUB_REPOSITORY_OWNER;
                      const repo = process.env.GITHUB_REPOSITORY.replace(`${owner}/`, '');
                      const comment_id = '${{ steps.find-comment.outputs.comment-id }}';

                      await octokit.rest.issues.deleteComment({
                        owner,
                        repo,
                        comment_id,
                      });
